<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b6e58">
<title>Philosophie lernen — Kenntnis & Anmaßung</title>
<style>
:root{
  color-scheme: light;
  --bg:#f7f6f2; --card:#ffffff; --ink:#1c1b18; --muted:#6b6862; --line:#e7e4dc;
  --brand:#3b6e58; --brand-soft:#e7f0ea; --gold:#c9a227;
  --right:#3b6e58; --right-soft:#e7f0ea; --wrong:#b4452f; --wrong-soft:#f6e6e1;
  --accent:#6a4c93; --accent-soft:#efe9f5;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 6px 18px rgba(0,0,0,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:0 16px;
  padding-top:env(safe-area-inset-top);padding-bottom:calc(24px + env(safe-area-inset-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.top{position:sticky;top:0;z-index:5;background:var(--bg);
  display:flex;align-items:center;gap:12px;padding:12px 0 10px}
.top .stat{display:flex;align-items:center;gap:5px;font-weight:700;font-size:15px}
.top .stat small{font-weight:600;color:var(--muted);font-size:13px}
.flame{color:var(--gold)} .xp{color:var(--brand)}
.top .back{font-size:22px;line-height:1;color:var(--ink);padding:4px 8px;margin-left:-8px}
.spacer{flex:1}

.hero{padding:8px 2px 4px}
.hero h1{font-size:21px;margin:0 0 4px;letter-spacing:-.01em}
.hero p{margin:0;color:var(--muted);font-size:14px}

.tabs{display:flex;gap:8px;margin:16px 0 6px}
.tab{flex:1;text-align:center;padding:11px 8px;border-radius:12px;font-weight:700;
  font-size:14px;background:var(--card);border:1px solid var(--line);color:var(--muted)}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.tab.active.allg{background:var(--accent);border-color:var(--accent)}

.blockhdr{display:flex;align-items:baseline;gap:8px;margin:22px 2px 10px}
.blockhdr .n{font-size:12px;font-weight:800;color:var(--brand);
  background:var(--brand-soft);padding:2px 8px;border-radius:999px;letter-spacing:.02em}
.allgmode .blockhdr .n{color:var(--accent);background:var(--accent-soft)}
.blockhdr h2{font-size:15px;margin:0;font-weight:700}
.blockhdr .sub{font-size:12px;color:var(--muted)}

.lesson{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .08s}
.lesson:active{transform:scale(.99)}
.badge{flex:none;width:46px;height:46px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;font-size:22px;background:var(--brand-soft)}
.allgmode .badge{background:var(--accent-soft)}
.lesson.done .badge{background:var(--brand);color:#fff}
.allgmode .lesson.done .badge{background:var(--accent)}
.l-body{flex:1;min-width:0}
.l-body .t{font-weight:700;font-size:15px}
.l-body .a{font-size:12.5px;color:var(--muted);margin-top:1px}
.l-prog{height:6px;border-radius:999px;background:var(--line);margin-top:8px;overflow:hidden}
.l-prog i{display:block;height:100%;background:var(--brand);width:0}
.allgmode .l-prog i{background:var(--accent)}
.chev{flex:none;color:var(--muted);font-size:20px}

#lessonView{display:none}
.pbar{flex:1;height:12px;border-radius:999px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;background:var(--brand);width:0;transition:width .3s}
.allgrun .pbar i{background:var(--accent)}

.card{background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:22px 20px;box-shadow:var(--shadow);min-height:230px;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.kicker{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  color:var(--brand);margin-bottom:10px}
.allgrun .kicker{color:var(--accent)}
.card h3{font-size:20px;margin:0 0 10px;letter-spacing:-.01em}
.card p{margin:0 0 12px;font-size:15.5px}
.card p:last-child{margin-bottom:0}
.card .lead{font-size:16px}
.tagline{display:inline-block;font-size:12.5px;color:var(--brand);font-weight:700;
  background:var(--brand-soft);padding:4px 10px;border-radius:999px;margin-top:6px}
.allgrun .tagline{color:var(--accent);background:var(--accent-soft)}
.emoji-big{font-size:34px;display:block;margin-bottom:6px}

.opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:#fff;border:2px solid var(--line);border-radius:14px;
  padding:13px 14px;font-size:15px;color:var(--ink);transition:.12s}
.opt:active{transform:scale(.99)}
.opt .k{flex:none;width:24px;height:24px;border-radius:7px;background:var(--bg);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--muted)}
.opt.correct{border-color:var(--right);background:var(--right-soft)}
.opt.correct .k{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrong-soft)}
.opt.wrong .k{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.dim{opacity:.5} .opt[disabled]{cursor:default}

.flip .front{font-size:17px;font-weight:600}
.flip .reveal{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:none;animation:pop .2s ease}
.flip.open .reveal{display:block}

.recall .prompt{font-size:17px;font-weight:600;margin-bottom:6px}
.recall .hint{font-size:13px;color:var(--muted)}
.recall .model{margin-top:14px;padding:14px;border-radius:12px;background:var(--brand-soft);font-size:14.5px;display:none;animation:pop .2s ease}
.allgrun .recall .model{background:var(--accent-soft)}
.recall.open .model{display:block}
.recall .model b{color:var(--brand)} .allgrun .recall .model b{color:var(--accent)}

.fb{margin-top:14px;padding:13px 14px;border-radius:12px;font-size:14.5px;display:none}
.fb.show{display:block;animation:pop .2s ease}
.fb.ok{background:var(--right-soft);color:#27503f}
.fb.no{background:var(--wrong-soft);color:#7d2c1c}
.fb b{display:block;margin-bottom:2px}

.foot{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 26%);
  padding:14px 0 calc(8px + env(safe-area-inset-bottom));margin-top:18px}
.btn{width:100%;background:var(--brand);color:#fff;font-weight:800;font-size:16px;
  padding:15px;border-radius:14px;letter-spacing:.01em;box-shadow:var(--shadow);transition:.1s}
.allgrun .btn{background:var(--accent)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:#fff;color:var(--ink);border:2px solid var(--line);box-shadow:none}
.btn[disabled]{opacity:.4;cursor:default}

.done-scr{text-align:center;padding:30px 16px}
.done-scr .big{font-size:54px}
.done-scr h2{margin:8px 0 4px;font-size:24px}
.done-scr p{color:var(--muted);margin:0 0 18px}
.scorebox{display:flex;gap:12px;justify-content:center;margin:18px 0 4px}
.scorebox div{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 18px;box-shadow:var(--shadow)}
.scorebox .v{font-size:22px;font-weight:800;color:var(--brand)}
.allgrun .scorebox .v{color:var(--accent)}
.scorebox .l{font-size:12px;color:var(--muted)}
.foothint{text-align:center;font-size:12px;color:var(--muted);margin-top:18px;padding:0 8px}
</style>
</head>
<body>
<div class="wrap">
  <div id="homeView">
    <div class="top">
      <div class="stat flame">🔥 <span id="streakNum">0</span> <small>Tage</small></div>
      <div class="spacer"></div>
      <div class="stat xp">⭐ <span id="xpNum">0</span> <small>XP</small></div>
    </div>
    <div class="hero">
      <h1>Philosophie lernen</h1>
      <p>Kleine Häppchen, eine Lektion pro Zugfahrt. Fortschritt wird auf diesem Gerät gespeichert.</p>
    </div>
    <div class="tabs">
      <button class="tab" id="tabKua" onclick="switchTrack('kua')">📕 Deine Quellen</button>
      <button class="tab allg" id="tabAllg" onclick="switchTrack('allg')">🌍 Philosophie allgemein</button>
    </div>
    <div id="lessonList"></div>
    <div class="foothint">Mehr Lektionen kommen mit der Zeit dazu.</div>
  </div>

  <div id="lessonView">
    <div class="top">
      <button class="back" onclick="quitLesson()">✕</button>
      <div class="pbar"><i id="pbarFill"></i></div>
      <div class="stat flame">🔥 <span id="streakNum2">0</span></div>
    </div>
    <div id="cardSlot"></div>
    <div class="foot"><button class="btn" id="actBtn" onclick="onAct()">Weiter</button></div>
  </div>
</div>

/* ===================== STATE ===================== */
const KEY="kua_lernapp_v2";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}}
let S=load();
S.xp=S.xp||0; S.lessons=S.lessons||{}; S.streak=S.streak||0; S.lastDay=S.lastDay||null;
S.track=S.track||"kua";
/* migrate v1 progress if present */
(function migrate(){
  try{
    const old=JSON.parse(localStorage.getItem("kua_lernapp_v1"));
    if(old && !S._migrated){
      S.xp=Math.max(S.xp, old.xp||0);
      S.streak=Math.max(S.streak, old.streak||0);
      S.lastDay=S.lastDay||old.lastDay;
      Object.assign(S.lessons, old.lessons||{});
      S._migrated=true; save(S);
    }
  }catch(e){}
})();
function today(){return new Date().toISOString().slice(0,10)}
function bumpStreak(){
  const t=today(); if(S.lastDay===t) return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?(S.streak+1):1; S.lastDay=t; save(S);
}
(function initStreak(){
  if(S.lastDay){
    const t=today(), y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    if(S.lastDay!==t && S.lastDay!==y){S.streak=0;}
  }
})();

/* ===================== HOME ===================== */
function switchTrack(t){ S.track=t; save(S); renderHome(); }
function renderHome(){
  document.getElementById("xpNum").textContent=S.xp;
  document.getElementById("streakNum").textContent=S.streak;
  const tk=S.track;
  document.getElementById("tabKua").classList.toggle("active", tk==="kua");
  document.getElementById("tabAllg").classList.toggle("active", tk==="allg");
  const home=document.getElementById("homeView");
  home.classList.toggle("allgmode", tk==="allg");
  const list=document.getElementById("lessonList");
  list.innerHTML="";
  BLOCKS[tk].forEach((b,bi)=>{
    const ls=LESSONS.filter(l=>l.track===tk && l.block===bi);
    if(!ls.length) return;
    const hdr=document.createElement("div");
    hdr.className="blockhdr";
    hdr.innerHTML='<span class="n">'+b.n+'</span><div><h2>'+b.title+'</h2><div class="sub">'+b.sub+'</div></div>';
    list.appendChild(hdr);
    ls.forEach(l=>{
      const pr=S.lessons[l.id]||{};
      const pct=pr.done?100:(pr.progress||0);
      const el=document.createElement("button");
      el.className="lesson"+(pr.done?" done":"");
      el.onclick=()=>startLesson(l.id);
      el.innerHTML='<div class="badge">'+(pr.done?"✓":l.icon)+'</div>'+
        '<div class="l-body"><div class="t">'+l.title+'</div>'+
          '<div class="a">'+l.author+'</div>'+
          '<div class="l-prog"><i style="width:'+pct+'%"></i></div></div>'+
        '<div class="chev">›</div>';
      list.appendChild(el);
    });
  });
  home.style.display="block";
  document.getElementById("lessonView").style.display="none";
  window.scrollTo(0,0);
}

/* ===================== RUNNER ===================== */
let cur=null, idx=0, answered=false, correctCount=0, answeredCount=0;
function startLesson(id){
  cur=LESSONS.find(l=>l.id===id);
  idx=0; correctCount=0; answeredCount=0;
  document.getElementById("homeView").style.display="none";
  const lv=document.getElementById("lessonView");
  lv.style.display="block";
  lv.classList.toggle("allgrun", cur.track==="allg");
  document.getElementById("streakNum2").textContent=S.streak;
  document.getElementById("actBtn").onclick=onAct;
  window.scrollTo(0,0);
  renderCard();
}
function quitLesson(){ renderHome(); }
function setProgress(){ document.getElementById("pbarFill").style.width=Math.round((idx/cur.cards.length)*100)+"%"; }
function renderCard(){
  setProgress(); answered=false;
  const c=cur.cards[idx];
  const slot=document.getElementById("cardSlot");
  const act=document.getElementById("actBtn");
  let html="";
  if(c.t==="info"){
    html='<div class="card"><div class="kicker">'+(c.kicker||"")+'</div>'+
      (c.emoji?'<span class="emoji-big">'+c.emoji+'</span>':"")+
      '<h3>'+c.h+'</h3>'+c.body.map((p,i)=>'<p class="'+(i===0?'lead':'')+'">'+p+'</p>').join("")+
      (c.tag?'<span class="tagline">'+c.tag+'</span>':"")+'</div>';
    slot.innerHTML=html; act.textContent="Weiter"; act.disabled=false; act.className="btn";
  } else if(c.t==="mc"){
    html='<div class="card"><div class="kicker">'+(c.kicker||"Quiz")+'</div><h3>'+c.q+'</h3>'+
      '<div class="opts" id="opts">'+c.opts.map((o,i)=>
        '<button class="opt" data-i="'+i+'" onclick="pick('+i+')"><span class="k">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></button>').join("")+
      '</div><div class="fb" id="fb"></div></div>';
    slot.innerHTML=html; act.textContent="Weiter"; act.disabled=true; act.className="btn";
  } else if(c.t==="flip"){
    html='<div class="card flip" id="flip"><div class="kicker">'+(c.kicker||"")+'</div>'+
      '<p class="front">'+c.front+'</p><div class="reveal">'+c.reveal+'</div></div>';
    slot.innerHTML=html; act.textContent="Antwort zeigen"; act.disabled=false; act.className="btn ghost";
  } else if(c.t==="recall"){
    html='<div class="card recall" id="recall"><div class="kicker">'+(c.kicker||"")+'</div>'+
      '<p class="prompt">'+c.prompt+'</p>'+(c.hint?'<p class="hint">💡 '+c.hint+'</p>':"")+
      '<div class="model">'+c.model+'</div></div>';
    slot.innerHTML=html; act.textContent="Musterlösung zeigen"; act.disabled=false; act.className="btn ghost";
  }
  window.scrollTo(0,0);
}
function pick(i){
  if(answered) return; answered=true; answeredCount++;
  const c=cur.cards[idx];
  document.querySelectorAll("#opts .opt").forEach(o=>{
    o.disabled=true; const oi=+o.dataset.i;
    if(oi===c.correct) o.classList.add("correct");
    else if(oi===i) o.classList.add("wrong"); else o.classList.add("dim");
  });
  const fb=document.getElementById("fb");
  if(i===c.correct){ correctCount++; fb.className="fb ok show"; fb.innerHTML="<b>Richtig ✓</b>"+c.fb; }
  else { fb.className="fb no show"; fb.innerHTML="<b>Nicht ganz</b>"+c.fb; }
  document.getElementById("actBtn").disabled=false;
}
function onAct(){
  const c=cur.cards[idx];
  if(c.t==="flip"){ const el=document.getElementById("flip");
    if(el && !el.classList.contains("open")){ el.classList.add("open");
      document.getElementById("actBtn").textContent="Weiter"; document.getElementById("actBtn").className="btn"; return; } }
  if(c.t==="recall"){ const el=document.getElementById("recall");
    if(el && !el.classList.contains("open")){ el.classList.add("open");
      document.getElementById("actBtn").textContent="Weiter"; document.getElementById("actBtn").className="btn"; return; } }
  idx++;
  if(idx>=cur.cards.length){ finishLesson(); return; }
  renderCard();
  const pr=S.lessons[cur.id]||{};
  if(!pr.done){ pr.progress=Math.round((idx/cur.cards.length)*100); S.lessons[cur.id]=pr; save(S); }
}
function finishLesson(){
  document.getElementById("pbarFill").style.width="100%";
  const wasDone=(S.lessons[cur.id]||{}).done;
  const gained = wasDone? 0 : 20 + correctCount*5;
  S.xp += gained;
  S.lessons[cur.id]={done:true, progress:100, correct:correctCount, total:answeredCount};
  bumpStreak(); save(S);
  document.getElementById("cardSlot").innerHTML='<div class="done-scr">'+
     '<div class="big">🎉</div><h2>Lektion geschafft!</h2><p>'+cur.title+'</p>'+
     '<div class="scorebox">'+
       '<div><div class="v">'+(answeredCount?correctCount+"/"+answeredCount:"–")+'</div><div class="l">Quiz richtig</div></div>'+
       '<div><div class="v">+'+gained+'</div><div class="l">XP'+(wasDone?" (Wdh.)":"")+'</div></div>'+
       '<div><div class="v">🔥 '+S.streak+'</div><div class="l">Streak</div></div></div>'+
     '<p class="foothint">Tipp: Lies die Quelle jetzt mit dem Gerüst im Kopf — du exzerpierst schneller.</p></div>';
  const act=document.getElementById("actBtn");
  act.textContent="Zurück zur Übersicht"; act.className="btn"; act.disabled=false;
  act.onclick=function(){ act.onclick=onAct; renderHome(); };
}

renderHome();
</script>
</body>
</html>
