<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b6e58">
<title>Philosophie lernen — Kenntnis & Anmaßung</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Philosophie">
<style>
:root{
  color-scheme: light;
  --bg:#f7f6f2; --card:#ffffff; --ink:#1c1b18; --muted:#6b6862; --line:#e7e4dc;
  --brand:#3b6e58; --brand-soft:#e7f0ea; --gold:#c9a227;
  --right:#3b6e58; --right-soft:#e7f0ea; --wrong:#b4452f; --wrong-soft:#f6e6e1;
  --accent:#6a4c93; --accent-soft:#efe9f5;
  --deep:#2f5d8a; --deep-soft:#e6eef6;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 6px 18px rgba(0,0,0,.05);
}
[data-theme="dark"]{
  color-scheme: dark;
  --bg:#121310; --card:#1c1e19; --ink:#ece9e2; --muted:#9c988e; --line:#30332c;
  --brand:#5aa483; --brand-soft:#1b271f; --gold:#d8b33a;
  --right:#5aa483; --right-soft:#19241d; --wrong:#e0826b; --wrong-soft:#2c1b15;
  --accent:#a98fd6; --accent-soft:#241d31;
  --deep:#6f9fd0; --deep-soft:#15212e;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 22px rgba(0,0,0,.45);
}
[data-theme="dark"] .btn{color:#10130f}
[data-theme="dark"] .tab.active{color:#10130f}
[data-theme="dark"] .fb.ok{color:#bfe6d2}
[data-theme="dark"] .fb.no{color:#f0c2b5}
.themebtn{font-size:17px;line-height:1;padding:7px 9px;border-radius:10px;
  color:var(--ink);background:var(--card);border:1px solid var(--line)}
.themebtn:active{transform:translateY(1px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:0 16px;
  padding-top:env(safe-area-inset-top);padding-bottom:calc(24px + env(safe-area-inset-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.top{position:sticky;top:0;z-index:5;background:var(--bg);
  display:flex;align-items:center;gap:12px;padding:12px 0 10px}
.top .stat{display:flex;align-items:center;gap:5px;font-weight:700;font-size:15px}
.top .stat small{font-weight:600;color:var(--muted);font-size:13px}
.flame{color:var(--gold)} .xp{color:var(--brand)}
.top .back{font-size:22px;line-height:1;color:var(--ink);padding:4px 8px;margin-left:-8px}
.spacer{flex:1}

.hero{padding:8px 2px 4px}
.hero h1{font-size:21px;margin:0 0 4px;letter-spacing:-.01em}
.hero p{margin:0;color:var(--muted);font-size:14px}

.tabs{display:flex;gap:6px;margin:16px 0 6px}
.tab{flex:1;text-align:center;padding:9px 5px;border-radius:12px;font-weight:700;
  font-size:12px;line-height:1.25;background:var(--card);border:1px solid var(--line);color:var(--muted)}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.tab.active.allg{background:var(--accent);border-color:var(--accent)}
.tab.active.tief{background:var(--deep);border-color:var(--deep)}
.tiefmode .blockhdr .n{color:var(--deep);background:var(--deep-soft)}
.tiefmode .badge{background:var(--deep-soft)}
.tiefmode .lesson.done .badge{background:var(--deep)}
.tiefmode .l-prog i{background:var(--deep)}
.tiefrun .pbar i{background:var(--deep)}
.tiefrun .kicker{color:var(--deep)}
.tiefrun .tagline{color:var(--deep);background:var(--deep-soft)}
.tiefrun .recall .model{background:var(--deep-soft)}
.tiefrun .recall .model b{color:var(--deep)}
.tiefrun .btn{background:var(--deep)}
.tiefrun .scorebox .v{color:var(--deep)}

.blockhdr{display:flex;align-items:baseline;gap:8px;margin:22px 2px 10px}
.blockhdr .n{font-size:12px;font-weight:800;color:var(--brand);
  background:var(--brand-soft);padding:2px 8px;border-radius:999px;letter-spacing:.02em}
.allgmode .blockhdr .n{color:var(--accent);background:var(--accent-soft)}
.blockhdr h2{font-size:15px;margin:0;font-weight:700}
.blockhdr .sub{font-size:12px;color:var(--muted)}

.lesson{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .08s}
.lesson:active{transform:scale(.99)}
.badge{flex:none;width:46px;height:46px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;font-size:22px;background:var(--brand-soft)}
.allgmode .badge{background:var(--accent-soft)}
.lesson.done .badge{background:var(--brand);color:#fff}
.allgmode .lesson.done .badge{background:var(--accent)}
.l-body{flex:1;min-width:0}
.l-body .t{font-weight:700;font-size:15px}
.l-body .a{font-size:12.5px;color:var(--muted);margin-top:1px}
.l-prog{height:6px;border-radius:999px;background:var(--line);margin-top:8px;overflow:hidden}
.l-prog i{display:block;height:100%;background:var(--brand);width:0}
.allgmode .l-prog i{background:var(--accent)}
.chev{flex:none;color:var(--muted);font-size:20px}

#lessonView{display:none}
.pbar{flex:1;height:12px;border-radius:999px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;background:var(--brand);width:0;transition:width .3s}
.allgrun .pbar i{background:var(--accent)}

.card{background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:22px 20px;box-shadow:var(--shadow);min-height:230px;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.kicker{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  color:var(--brand);margin-bottom:10px}
.allgrun .kicker{color:var(--accent)}
.card h3{font-size:20px;margin:0 0 10px;letter-spacing:-.01em}
.card p{margin:0 0 12px;font-size:15.5px}
.card p:last-child{margin-bottom:0}
.card .lead{font-size:16px}
.tagline{display:inline-block;font-size:12.5px;color:var(--brand);font-weight:700;
  background:var(--brand-soft);padding:4px 10px;border-radius:999px;margin-top:6px}
.allgrun .tagline{color:var(--accent);background:var(--accent-soft)}
.emoji-big{font-size:34px;display:block;margin-bottom:6px}

.opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:13px 14px;font-size:15px;color:var(--ink);transition:.12s}
.opt:active{transform:scale(.99)}
.opt .k{flex:none;width:24px;height:24px;border-radius:7px;background:var(--bg);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--muted)}
.opt.correct{border-color:var(--right);background:var(--right-soft)}
.opt.correct .k{background:var(--right);color:#fff;border-color:var(--right)}
.opt.wrong{border-color:var(--wrong);background:var(--wrong-soft)}
.opt.wrong .k{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.dim{opacity:.5} .opt[disabled]{cursor:default}

.flip .front{font-size:17px;font-weight:600}
.flip .reveal{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:none;animation:pop .2s ease}
.flip.open .reveal{display:block}

.recall .prompt{font-size:17px;font-weight:600;margin-bottom:6px}
.recall .hint{font-size:13px;color:var(--muted)}
.recall .model{margin-top:14px;padding:14px;border-radius:12px;background:var(--brand-soft);font-size:14.5px;display:none;animation:pop .2s ease}
.allgrun .recall .model{background:var(--accent-soft)}
.recall.open .model{display:block}
.recall .model b{color:var(--brand)} .allgrun .recall .model b{color:var(--accent)}

.fb{margin-top:14px;padding:13px 14px;border-radius:12px;font-size:14.5px;display:none}
.fb.show{display:block;animation:pop .2s ease}
.fb.ok{background:var(--right-soft);color:#27503f}
.fb.no{background:var(--wrong-soft);color:#7d2c1c}
.fb b{display:block;margin-bottom:2px}

.foot{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 26%);
  padding:14px 0 calc(8px + env(safe-area-inset-bottom));margin-top:18px}
.btn{width:100%;background:var(--brand);color:#fff;font-weight:800;font-size:16px;
  padding:15px;border-radius:14px;letter-spacing:.01em;box-shadow:var(--shadow);transition:.1s}
.allgrun .btn{background:var(--accent)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--card);color:var(--ink);border:2px solid var(--line);box-shadow:none}
.btn[disabled]{opacity:.4;cursor:default}

.done-scr{text-align:center;padding:30px 16px}
.done-scr .big{font-size:54px}
.done-scr h2{margin:8px 0 4px;font-size:24px}
.done-scr p{color:var(--muted);margin:0 0 18px}
.scorebox{display:flex;gap:12px;justify-content:center;margin:18px 0 4px}
.scorebox div{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 18px;box-shadow:var(--shadow)}
.scorebox .v{font-size:22px;font-weight:800;color:var(--brand)}
.allgrun .scorebox .v{color:var(--accent)}
.scorebox .l{font-size:12px;color:var(--muted)}
.foothint{text-align:center;font-size:12px;color:var(--muted);margin-top:18px;padding:0 8px}
</style>
</head>
<body>
<div class="wrap">
  <div id="homeView">
    <div class="top">
      <div class="stat flame">🔥 <span id="streakNum">0</span> <small>Tage</small></div>
      <div class="spacer"></div>
      <div class="stat xp">⭐ <span id="xpNum">0</span> <small>XP</small></div>
      <button class="themebtn" id="themeBtn" onclick="toggleTheme()" aria-label="Hell/Dunkel wechseln" title="Hell/Dunkel">🌙</button>
    </div>
    <div class="hero">
      <h1>Philosophie lernen</h1>
      <p>Kleine Häppchen, eine Lektion pro Zugfahrt. Fortschritt wird auf diesem Gerät gespeichert.</p>
    </div>
    <div class="tabs">
      <button class="tab" id="tabKua" onclick="switchTrack('kua')">📕 Deine Quellen</button>
      <button class="tab tief" id="tabTief" onclick="switchTrack('tief')">📘 Quellen vertieft</button>
      <button class="tab allg" id="tabAllg" onclick="switchTrack('allg')">🌍 Philosophie allgemein</button>
    </div>
    <div id="lessonList"></div>
    <div class="foothint">Mehr Lektionen kommen mit der Zeit dazu.</div>
  </div>

  <div id="lessonView">
    <div class="top">
      <button class="back" onclick="quitLesson()">✕</button>
      <div class="pbar"><i id="pbarFill"></i></div>
      <div class="stat flame">🔥 <span id="streakNum2">0</span></div>
    </div>
    <div id="cardSlot"></div>
    <div class="foot"><button class="btn" id="actBtn" onclick="onAct()">Weiter</button></div>
  </div>
</div>

<script>
/* v2.4 — Track „Quellen vertieft" auf 24 Werke erweitert (9 Blöcke) */
/* ===================== BLÖCKE ===================== */
const BLOCKS = {
  kua:[
    {n:"Block 1", title:"Epistemische Grundlage", sub:"Warum Wissen begrenzt ist — das Fundament deines Titels"},
    {n:"Block 2", title:"Stoischer Block", sub:"Anmaßung als Haltungsproblem"},
    {n:"Block 3", title:"Existenzielle Dimension", sub:"Sinn statt aufgezwungenem Wert"},
    {n:"Block 4", title:"Politische Dimension", sub:"Die Grenze des Eigenen"},
    {n:"Block 5", title:"Ergänzende Perspektiven", sub:"Hedonistisches Ziel & theologische Grundierung"},
    {n:"Block 6", title:"Erkenntnis & Grenze", sub:"Hayek, Wittgenstein, Arendt, Spinoza — die Wurzeln der „Anmaßung“"},
    {n:"Block 7", title:"Stoa & Epikur — die Quellen", sub:"Marc Aurel, Epikur, Hadot, Becker"},
    {n:"Block 8", title:"Schwarm & Bindung", sub:"Aristoteles, Dunbar, Putnam, Bauman"},
    {n:"Block 9", title:"Relationale Werte", sub:"Veblen, Hirsch, Frank — die Logik der Positionsgüter"},
    {n:"Block 10", title:"Diagnose der Moderne", sub:"Ehrenberg, Han, Rosa, Taylor"},
    {n:"Block 11", title:"Stadt & gebaute Umwelt", sub:"Alexander, Jacobs, Marohn"},
    {n:"Block 12", title:"Demokratie & Institutionen", sub:"Aristoteles, Tocqueville, Lipset, Buchanan, Acemoglu/Robinson"},
    {n:"Block 13", title:"Ethik-Spannungen & Form", sub:"Murdoch, Levinas, Comte-Sponville, Nozick"},
    {n:"Block 14", title:"Theologische Grundierung (privat)", sub:"Hoffnung, Kenosis, „leere Hölle“"},
  ],
  tief:[
    {n:"Block 1", title:"Erkenntnis & Unsicherheit", sub:"Taleb & Surowiecki — wie viel können wir wissen?"},
    {n:"Block 2", title:"Stoische Lebenskunst", sub:"Epiktet, Irvine, Sommer — die Kunst der Gelassenheit"},
    {n:"Block 3", title:"Sinn", sub:"Frankl — Überleben durch Bedeutung"},
    {n:"Block 4", title:"Freiheit & Gemeinwesen", sub:"Mill, Sandel, Taleb — Individuum und Gesellschaft"},
    {n:"Block 5", title:"Glück & Glaube", sub:"Epikur (Geyer) & Lewis — Lust und Transzendenz"},
    {n:"Block 6", title:"Erkenntnis & ihre Grenzen", sub:"Hayek, Wittgenstein, Spinoza"},
    {n:"Block 7", title:"Stoa & gutes Leben", sub:"Marc Aurel & Aristoteles"},
    {n:"Block 8", title:"Gemeinschaft, Status & Moderne", sub:"Putnam, Veblen, Han, Rosa"},
    {n:"Block 9", title:"Politik, Stadt & öffentliche Welt", sub:"Tocqueville, Aristoteles, Arendt, Jacobs"},
  ],
  allg:[
    {n:"Start", title:"Grundlagen", sub:"Die Landkarte der Philosophie & das Handwerk"},
    {n:"Antike", title:"Das Fundament", sub:"Vorsokratiker, Athen & der Hellenismus"},
    {n:"Mittelalter", title:"Glaube & Vernunft", sub:"Augustinus und Thomas von Aquin"},
    {n:"Neuzeit", title:"Die Erkenntnisfrage", sub:"Rationalismus, Empirismus & Kants Synthese"},
    {n:"Politik", title:"Das Zusammenleben", sub:"Vom Gesellschaftsvertrag bis zur Gerechtigkeit"},
    {n:"19. Jh.", title:"Nach Kant", sub:"Hegel, Schopenhauer, Utilitarismus, Nietzsche"},
    {n:"20. Jh.", title:"Die Moderne", sub:"Existenz, Phänomenologie, Sprache, Wissenschaft"},
  ]
};

/* ===================== LEKTIONEN ===================== */
const LESSONS = [
/* ============ KUA · BLOCK 1 ============ */
{ id:"taleb-bs", track:"kua", block:0, icon:"🦢",
 title:"Taleb — The Black Swan", author:"Nassim Nicholas Taleb · 2007",
 cards:[
  {t:"info", kicker:"Worum es geht", emoji:"🎯", h:"Das Fundament deines Titels",
   body:["Dein Buchtitel ist im Kern eine <b>erkenntnistheoretische These</b>: dass unser Wissen Grenzen hat — und wir das chronisch unterschätzen.",
         "Taleb liefert genau deren Begründung. Sein Name dafür: <b>epistemische Arroganz</b>. Das ist wörtlich deine „Anmaßung“."],
   tag:"≈ Satz 3 · Anti-Urteils-Prinzip"},
  {t:"info", kicker:"Der Begriff", emoji:"🦢", h:"Was ist ein Schwarzer Schwan?",
   body:["Ein Ereignis mit <b>drei Merkmalen</b>:",
         "1) Es liegt <b>außerhalb</b> der regulären Erwartung.<br>2) Es hat <b>extreme Wirkung</b>.<br>3) Im <b>Nachhinein</b> basteln wir eine Geschichte, die es vorhersehbar erscheinen lässt.",
         "Beispiele: 9/11, das Internet, ein Börsencrash, der Bestseller „aus dem Nichts“."]},
  {t:"mc", kicker:"Mini-Check", q:"Welches ist <b>kein</b> Merkmal eines Schwarzen Schwans?",
   opts:["Extreme Wirkung","Es war vorher klar vorhersehbar","Im Nachhinein wird es für erklärbar gehalten","Es liegt außerhalb der regulären Erwartung"],
   correct:1, fb:"Genau umgekehrt: Ein Schwarzer Schwan ist <b>nicht</b> vorhersehbar — er wirkt nur <i>hinterher</i> so."},
  {t:"info", kicker:"Das Bild, das bleibt", emoji:"🦃", h:"Der Truthahn",
   body:["Ein Truthahn wird 1000 Tage gefüttert und schließt mit wachsender Sicherheit: Die Menschen meinen es gut mit mir.",
         "Sein Vertrauen ist am <b>höchsten</b> — am Tag vor Thanksgiving.",
         "Lehre: Aus noch so vielen Beobachtungen kannst du die <b>Katastrophe nicht ausschließen</b>."]},
  {t:"mc", kicker:"Mini-Check", q:"Was ist die Lehre aus dem Truthahn?",
   opts:["Mehr Daten führen immer zu sichereren Urteilen","Vergangenheitsdaten können die Katastrophe nicht ausschließen","Tiere können nicht rechnen","Man sollte Statistik meiden"],
   correct:1, fb:"Richtig. Das Vertrauen wuchs mit den Daten — und war im Moment des Bruchs am größten."},
  {t:"info", kicker:"Die Kern-Unterscheidung", emoji:"⚖️", h:"Mediokristan vs. Extremistan",
   body:["<b>Mediokristan:</b> Keine einzelne Beobachtung dominiert das Ganze (Körpergröße). Hier funktioniert die Glockenkurve.",
         "<b>Extremistan:</b> Ein einziges Ereignis dominiert die Summe (Vermögen, Buchverkäufe, Märkte).",
         "Der <b>Kardinalfehler</b>: Werkzeuge aus Mediokristan auf Extremistan anwenden."]},
  {t:"mc", kicker:"Mini-Check", q:"Welcher Bereich gehört zu <b>Extremistan</b>?",
   opts:["Körpergröße der Menschen","Tagestemperatur in Berlin","Vermögensverteilung","Schuhgröße"],
   correct:2, fb:"Vermögen: Eine einzige Person kann den Durchschnitt einer ganzen Stichprobe sprengen."},
  {t:"info", kicker:"Drei Illusionen", emoji:"🌫️", h:"Warum wir Wissen vortäuschen",
   body:["<b>Narrative Verzerrung:</b> Wir zwingen Geschichten auf den Zufall.",
         "<b>Stummes Zeugnis</b> (Survivorship): Wir sehen Überlebende, nie den Friedhof.",
         "<b>Ludische Verzerrung:</b> Wir verwechseln die saubere Zufälligkeit von Spielen mit echter Unsicherheit."]},
  {t:"mc", kicker:"Mini-Check", q:"Du bewunderst nur erfolgreiche Gründer und übersiehst die Gescheiterten mit gleicher Strategie. Welcher Denkfehler?",
   opts:["Ludische Verzerrung","Stummes Zeugnis (Survivorship)","Narrative Verzerrung","Mediokristan-Fehler"],
   correct:1, fb:"Der „Friedhof“ bleibt unsichtbar — und verzerrt, was wir für Erfolgsrezepte halten."},
  {t:"flip", kicker:"Verbindung zum Buch", front:"Wofür brauchst du Taleb in <i>Kenntnis und Anmaßung</i>?",
   reveal:"Als <b>epistemisches Fundament für Satz 3</b>: Wenn wir schon messbare Systeme nicht zuverlässig beurteilen können, dann erst recht nicht das <b>Glück eines anderen Menschen</b>.<br><br>Dein Anti-Urteils-Prinzip ist damit keine moralische Bescheidenheit, sondern eine <b>erkenntnistheoretische Notwendigkeit</b>. Der Truthahn stützt zusätzlich deine „Qualitative Längskenntnis“."},
  {t:"recall", kicker:"Selbst erinnern", prompt:"Warum macht „mehr Daten“ das Urteil nicht automatisch sicherer?", hint:"Denk an den Truthahn und an Extremistan.",
   model:"<b>Stichpunkte:</b> In Extremistan kommt das Entscheidende aus seltenen Ausreißern, die in den bisherigen Daten gar nicht vorkommen. Mehr Beobachtungen aus der ruhigen Zeit erhöhen nur das <i>Gefühl</i> von Sicherheit, nicht das Wissen über den Bruch."},
 ]},
{ id:"surowiecki", track:"kua", block:0, icon:"🐝",
 title:"Surowiecki — Die Weisheit der Vielen", author:"James Surowiecki · 2004",
 cards:[
  {t:"info", kicker:"Worum es geht", emoji:"🐝", h:"Das Gegengewicht zu Taleb",
   body:["Taleb zeigt: Einzel-Wissen ist begrenzt. Surowiecki zeigt die andere Seite: Unter den richtigen Bedingungen ist das <b>verteilte Wissen vieler</b> erstaunlich treffsicher — oft besser als jeder Experte.",
         "Das ist die <b>positive</b> Seite deiner Schwarmtheorie."], tag:"≈ Satz 6 · Schwarm-Engagement"},
  {t:"info", kicker:"Das Gründungsbeispiel", emoji:"🐂", h:"Galtons Ochse",
   body:["1906, ein Viehmarkt: Rund 800 Leute schätzen das Gewicht eines Ochsen. Einzeln liegen die meisten daneben.",
         "Aber der <b>Durchschnitt aller Schätzungen</b> trifft fast exakt (1197 vs. 1198 Pfund) — besser als jeder Viehexperte."]},
  {t:"mc", kicker:"Mini-Check", q:"Was zeigt das Galton-Beispiel?",
   opts:["Experten irren immer","Der Durchschnitt vieler unabhängiger Schätzungen kann genauer sein als jeder Einzelne","Schätzen ist sinnlos","Mehrheiten haben moralisch recht"],
   correct:1, fb:"Die individuellen Fehler heben sich auf — übrig bleibt das gebündelte Wissen."},
  {t:"info", kicker:"Die Bedingungen", emoji:"🧩", h:"Vier Voraussetzungen",
   body:["Schwärme sind nur klug, wenn vier Dinge gegeben sind:",
         "<b>1) Meinungsvielfalt</b><br><b>2) Unabhängigkeit</b> — Urteile beeinflussen sich nicht.<br><b>3) Dezentralisierung</b> — lokales Wissen.<br><b>4) Aggregation</b> — ein Mechanismus, der alles bündelt."]},
  {t:"mc", kicker:"Mini-Check", q:"Alle ahmen einander nach (Herdentrieb). Welche Bedingung ist verletzt?",
   opts:["Aggregation","Dezentralisierung","Unabhängigkeit","Meinungsvielfalt"],

   body:["<b>Metaphysik</b> — Was gibt es? Was ist Wirklichkeit?<br><b>Erkenntnistheorie</b> — Was und wie können wir wissen?<br><b>Ethik</b> — Wie soll ich handeln?<br><b>Logik</b> — Was folgt gültig woraus?<br><b>Ästhetik</b> — Was ist Schönheit und Kunst?",
         "Dazu die <b>politische Philosophie</b>: Wie sollen wir zusammenleben?"]},
  {t:"mc", kicker:"Mini-Check", q:"„Können wir die Außenwelt sicher erkennen?“ gehört zu …",
   opts:["Ethik","Erkenntnistheorie","Ästhetik","Logik"],
   correct:1, fb:"Eine Frage nach Möglichkeit und Grenzen des Wissens."},
  {t:"mc", kicker:"Mini-Check", q:"„Was macht eine Handlung gut?“ gehört zu …",
   opts:["Metaphysik","Logik","Ethik","Erkenntnistheorie"],
   correct:2, fb:"Die Kernfrage der Ethik."},
  {t:"info", kicker:"Warum das nützt", emoji:"🔗", h:"Alles hat seinen Ort",
   body:["Fast jede philosophische Debatte lässt sich einem dieser Felder zuordnen — und oft liegt der Streit darin, dass zwei Leute eigentlich über <i>verschiedene</i> Felder reden."]},
  {t:"flip", kicker:"Bonus · dein Projekt", front:"Wo liegt <i>Kenntnis und Anmaßung</i> auf der Landkarte?",
   reveal:"An der <b>Naht von Erkenntnistheorie und Ethik</b>: Dein Kerngedanke macht die <i>Wissensbedingungen des Urteilens</i> zur ethischen Grundoperation. Genau das nennst du „epistemische Ethik“ — keine Tugend-, Pflicht- oder Folgenethik."},
 ]},
{ id:"a-logik", track:"allg", block:0, icon:"♟️",
 title:"Logik & Argumentation", author:"Das Handwerkszeug",
 cards:[
  {t:"info", kicker:"Worum es geht", emoji:"♟️", h:"Wie man sauber denkt",
   body:["Logik ist nicht <i>was</i> man denkt, sondern <b>ob die Schlüsse halten</b>. Sie ist das Werkzeug, mit dem jede andere Disziplin arbeitet."]},
  {t:"info", kicker:"Der Baustein", emoji:"🧱", h:"Das Argument",
   body:["Ein Argument hat <b>Prämissen</b> (Annahmen) und eine <b>Konklusion</b> (Schluss). Beispiel: Alle Menschen sind sterblich · Sokrates ist ein Mensch · ⟹ Sokrates ist sterblich.",
         "Das ist ein <b>gültiger</b> Schluss: Wenn die Prämissen wahr sind, <i>muss</i> die Konklusion wahr sein."]},
  {t:"info", kicker:"Die Schlüsselunterscheidung", emoji:"⚖️", h:"Gültig ≠ wahr",
   body:["<b>Gültig</b> heißt: Die Form stimmt — der Schluss folgt aus den Prämissen.<br><b>Schlüssig (wahr)</b> heißt: gültig <i>und</i> die Prämissen sind tatsächlich wahr.",
         "Man kann perfekt logisch aus falschen Annahmen Unsinn ableiten."]},
  {t:"mc", kicker:"Mini-Check", q:"Ein Argument ist „gültig“, wenn …",
   opts:["die Prämissen wahr sind","die Konklusion zwingend aus den Prämissen folgt","alle zustimmen","es überzeugend klingt"],
   correct:1, fb:"Gültigkeit betrifft die <i>Form</i> — nicht, ob die Annahmen wahr sind."},
  {t:"info", kicker:"Induktion vs. Deduktion", emoji:"🔀", h:"Zwei Schlussrichtungen",
   body:["<b>Deduktion</b>: vom Allgemeinen zum Einzelnen, beweissicher (Mathematik).<br><b>Induktion</b>: vom Einzelnen zum Allgemeinen, nur wahrscheinlich (Naturwissenschaft).",
         "Humes Induktionsproblem trifft genau die zweite — und damit Talebs Truthahn."]},
  {t:"info", kicker:"Vorsicht", emoji:"⚠️", h:"Fehlschlüsse erkennen",
   body:["Häufige Denkfallen: <b>Strohmann</b> (Gegner verzerren), <b>ad hominem</b> (Person statt Sache angreifen), <b>Zirkelschluss</b> (Behauptung als eigener Beweis), <b>falsches Dilemma</b> (nur zwei Optionen vorgaukeln)."]},
  {t:"mc", kicker:"Mini-Check", q:"„Du hast keine Ahnung, also ist dein Argument falsch.“ — welcher Fehlschluss?",
   opts:["Strohmann","Ad hominem","Zirkelschluss","Falsches Dilemma"],
   correct:1, fb:"Angriff auf die Person statt auf das Argument = ad hominem."},
  {t:"recall", kicker:"Selbsttest", prompt:"Erkläre den Unterschied zwischen einem <b>gültigen</b> und einem <b>schlüssigen (wahren)</b> Argument.",
   hint:"Form vs. Wahrheit der Prämissen.",
   model:"Gültig = die Konklusion folgt zwingend aus den Prämissen (reine Form). Schlüssig/wahr = zusätzlich sind die Prämissen tatsächlich wahr. Ein gültiges Argument kann aus falschen Prämissen eine falsche Konklusion korrekt ableiten."},
  {t:"flip", kicker:"Bonus · dein Projekt", front:"Warum steht das am Anfang?",
   reveal:"Dein Buch ist eine <b>axiomatische</b> Argumentation (Sätze, die aufeinander aufbauen). Die Gültig-vs-wahr-Unterscheidung ist dabei dein schärfstes Selbstprüfungs-Werkzeug: Folgt mein Satz wirklich — und stimmen die Prämissen?"},
 ]},

   body:["Der Gegenpol: Veränderung ist eine <b>Illusion</b> der Sinne. „Das Seiende ist, das Nichtseiende ist nicht.“ Wahre Erkenntnis kommt allein aus dem <b>Denken</b>, nicht aus der trügerischen Wahrnehmung."]},
  {t:"mc", kicker:"Mini-Check", q:"Welcher Gegensatz prägt die Vorsokratik?",

   correct:1, fb:"Fluss vs. Fels — der erste große Streit der Metaphysik."},
  {t:"info", kicker:"Demokrit", emoji:"⚛️", h:"Die Atome",
   body:["Demokrit löst den Streit material: Alles besteht aus unteilbaren <b>Atomen</b> im leeren Raum. Eine erstaunlich moderne Idee — 2400 Jahre vor der Physik."]},
  {t:"mc", kicker:"Mini-Check", q:"Was suchten die Vorsokratiker?",
   opts:["Den besten Staat","Das Urprinzip (arché) der Natur","Den Sinn des Lebens","Die Erlösung"],

  {t:"flip", kicker:"Bonus · Einordnung", front:"Warum sind sie wichtig?",
   reveal:"Sie machen den entscheidenden Schritt <b>vom Mythos zum Logos</b>: Welterklärung durch Vernunft und Beobachtung statt durch Götter. Heraklits „alles fließt“ klingt zudem in deinem Wandel-/Unsicherheits-Thema nach."},
 ]},
{ id:"a-sokrates", track:"allg", block:1, icon:"🏺",

  {t:"info", kicker:"Sokrates", emoji:"❓", h:"Wissen, dass man nichts weiß",
   body:["Sokrates schrieb nichts; er <b>fragte</b>. Die sokratische Methode (Mäeutik, „Hebammenkunst“) bringt durch gezieltes Nachfragen die Widersprüche im Gegenüber ans Licht.",

  {t:"info", kicker:"Platon", emoji:"💡", h:"Die Ideenlehre",

  {t:"info", kicker:"Das berühmteste Bild", emoji:"🕳️", h:"Das Höhlengleichnis",
   body:["Gefesselte sehen an der Höhlenwand nur <b>Schatten</b> und halten sie für die Wirklichkeit. Philosophie ist der mühsame Weg aus der Höhle ans Licht — und die Schatten als Schatten zu erkennen."]},
  {t:"mc", kicker:"Mini-Check", q:"Was zeigt das Höhlengleichnis?",

  {t:"flip", kicker:"Bonus · dein Projekt", front:"Was hat Sokrates mit deinem Thema zu tun?",
   reveal:"Sein „Ich weiß, dass ich nichts weiß“ ist der <b>Urahn deines Anmaßungs-Themas</b>: Der Weise erkennt die Grenzen seines Wissens — der Anmaßende überschätzt sie."},
 ]},
{ id:"a-aristoteles", track:"allg", block:1, icon:"📐",
 title:"Aristoteles", author:"384–322 v. Chr.",

   body:["Platons Schüler — aber er traut der <b>Beobachtung</b> mehr als der reinen Ideenwelt. Begründer der Logik und vieler Einzelwissenschaften."]},
  {t:"info", kicker:"Das Lebensziel", emoji:"🌱", h:"Eudaimonia & Tugend",
   body:["Ziel des Lebens ist <b>Eudaimonia</b> — ein gelingendes, erfülltes Leben (nicht bloß Spaß).",
         "Erreicht wird es durch <b>Tugend</b>: exzellente Charakterhaltungen, eingeübt zur Gewohnheit."]},
  {t:"info", kicker:"Die Faustregel", emoji:"⚖️", h:"Die goldene Mitte",
   body:["Tugend liegt als <b>Mitte</b> zwischen zwei Lastern: Mut zwischen Feigheit und Tollkühnheit, Großzügigkeit zwischen Geiz und Verschwendung."]},
  {t:"mc", kicker:"Mini-Check", q:"Tapferkeit liegt laut Aristoteles zwischen …",

  {t:"flip", kicker:"Bonus · dein Projekt", front:"Anknüpfungspunkt für dein Buch?",

 ]},
{ id:"a-hellenismus", track:"allg", block:1, icon:"🏛️",
 title:"Stoa, Epikur & die Skeptiker", author:"Hellenismus · ab 300 v. Chr.",
 cards:[
  {t:"info", kicker:"Worum es geht", emoji:"🏛️", h:"Philosophie als Lebenskunst",
   body:["Nach Aristoteles verschiebt sich die Frage: nicht mehr „Was ist die Welt?“, sondern „<b>Wie werde ich angesichts des Chaos seelenruhig und glücklich?</b>“ Philosophie wird zur <b>Therapie</b>."]},
  {t:"info", kicker:"Die Stoa", emoji:"🧘", h:"Was in meiner Macht steht",
   body:["Zentrale Unterscheidung: Manches steht <b>in meiner Macht</b> (mein Urteil, mein Handeln), das meiste <b>nicht</b> (Ruf, Besitz, andere Menschen, der Tod).",
         "Gelassenheit (<b>Ataraxie</b>) heißt: nur das Erste ernst nehmen, das Zweite annehmen, wie es kommt."]},
  {t:"mc", kicker:"Mini-Check", q:"Worauf konzentriert sich der Stoiker?",
   opts:["Auf möglichst viel Besitz","Auf das, was in seiner Macht steht","Auf den guten Ruf","Auf das Vermeiden aller Gefühle"],
   correct:1, fb:"Die Dichotomie der Kontrolle — Herzstück der Stoa."},
  {t:"info", kicker:"Epikur", emoji:"🌿", h:"Lust als Abwesenheit von Schmerz",
   body:["Epikur sucht das <b>Glück</b> ebenfalls — aber als <b>Lust</b>, richtig verstanden: nicht Rausch, sondern <b>Schmerzfreiheit und innere Ruhe</b> (Ataraxie). Bescheidene Freuden, Freundschaft, kein Übermaß."]},
  {t:"info", kicker:"Die Skeptiker", emoji:"🤷", h:"Urteilsenthaltung",
   body:["Die Skeptiker ziehen die radikalste Konsequenz: Da wir nichts sicher wissen können, sollen wir das <b>Urteil zurückhalten</b> (Epoché). Gerade das bringe den Seelenfrieden."]},
  {t:"mc", kicker:"Mini-Check", q:"Was empfehlen die antiken Skeptiker?",
   opts:["Alles zu glauben","Sich des sicheren Urteils zu enthalten","Nur der Religion zu vertrauen","Ständig zu streiten"],
   correct:1, fb:"Epoché — Urteilsenthaltung als Weg zur Ruhe."},
  {t:"recall", kicker:"Selbsttest", prompt:"Was unterscheidet das stoische vom epikureischen Glücksideal?",
   hint:"Pflicht/Kontrolle vs. Lust/Schmerzfreiheit.",
   model:"Beide zielen auf Seelenruhe (Ataraxie). Die Stoa erreicht sie durch Tugend und Akzeptanz des Unkontrollierbaren (Konzentration auf das eigene Urteil). Epikur durch das kluge Maß der Lust — verstanden als Abwesenheit von Schmerz und Angst, nicht als Genusssucht."},
  {t:"flip", kicker:"Bonus · dein Projekt", front:"Warum ist das dein direkter Vorlauf?",
   reveal:"Das ist die <b>antike Wurzel deines KuA-Blocks 7</b> (Marc Aurel, Epikur). Die stoische Dichotomie der Kontrolle ist praktisch dein Anmaßungs-Thema in Lebenskunst übersetzt: Maße dir kein Urteil über das an, was nicht in deiner Macht steht."},
 ]},

 ]},

   body:["Friedrich August von Hayek (1899–1992), österreichischer Ökonom, Nobelpreis 1974. Sein Lebensthema: Das Wissen einer Gesellschaft ist <b>verstreut</b> — lokal, an Millionen Köpfe gebunden. Niemand hat es zentral.",
         "Daraus seine berühmte Kritik an staatlicher Planung: Wer eine Wirtschaft oder Gesellschaft „von oben“ steuern will, maßt sich ein Wissen an, das es so gar nicht gibt."],
   tag:"≈ Buchtitel · Satz 3"},
  {t:"info", kicker:"Der Begriff", emoji:"📉", h:"„Anmaßung von Wissen“",
   body:["Titel seiner Nobelpreisrede 1974 (<i>The Pretence of Knowledge</i>). Kernvorwurf: Die Sozialwissenschaft imitiert die Naturwissenschaft und tut so, als könne sie komplexe Ordnungen messen und steuern.",
         "Echte Ordnung entsteht für Hayek <b>spontan</b> — Markt, Sprache, Recht —, getragen von <b>generellen Regeln</b>, nicht von Einzeleingriffen."]},
  {t:"mc", kicker:"Mini-Check", q:"Was meint Hayek mit „Anmaßung von Wissen“?",
   opts:["Den Mut, Neues zu wagen","Den Irrglauben, komplexe Ordnungen zentral steuern zu können","Bildungsarroganz von Experten","Die Grenzen der Mathematik"],
   correct:1, fb:"Genau: der Glaube, ein verstreutes, unzugängliches Wissen zentral zu besitzen und lenken zu können."},
  {t:"flip", kicker:"Verbindung zum Buch", front:"Warum steht Hayek im Titel deines Buchs?",
   reveal:"Dein Begriff „Anmaßung“ knüpft direkt an Hayek an — du <b>erweiterst</b> ihn aber von der Ökonomie auf Ethik, Politik und Theologie.<br><br>Drei Übernahmen: (1) Das Wissensproblem begründet dein <b>Anti-Urteils-Prinzip</b> (Satz 3) — säkular statt theologisch. (2) <b>Generelle Regeln statt Einzelentscheidungen</b> → Vorbild für die Mandatstreuhand. (3) Die „Hayek-Erläuterungs-Form“ (jedes Axiom mit kurzem Erläuterungsabsatz) ist deine Stilvorgabe für die Sechs Axiome."},
  {t:"recall", kicker:"Selbst erinnern", prompt:"Übertrage Hayeks Wissensproblem von der Wirtschaft auf das Urteil über einen anderen Menschen.", hint:"Wenn schon eine Volkswirtschaft zu komplex ist …",
   model:"<b>Kern:</b> Ist schon eine Volkswirtschaft zu komplex, um sie zentral zu kennen und zu steuern, dann ist das Innere eines einzelnen Menschen erst recht unzugänglich. Über ihn zu urteilen heißt, ein Wissen zu behaupten, das man nicht hat — Anmaßung."},
 ]},
{ id:"wittgenstein", track:"kua", block:5, icon:"🪜",
 title:"Wittgenstein — Tractatus", author:"Ludwig Wittgenstein · 1921",
 cards:[
  {t:"info", kicker:"Worum es geht", emoji:"🪜", h:"Die Grenze des Sagbaren",
   body:["Ludwig Wittgenstein (1889–1951), <i>Tractatus logico-philosophicus</i> (1921) — sein erstes Hauptwerk, aufgebaut wie ein logisches Gerüst aus nummerierten Sätzen.",
         "Grundidee: Sprache <b>bildet die Welt ab</b>. Was sich klar sagen lässt, gehört zur Wissenschaft. Alles andere — Ethik, Sinn, das Mystische — liegt jenseits der Sprachgrenze."],
   tag:"≈ Axiom 2 · Schranke"},
  {t:"info", kicker:"Der Schlusssatz", emoji:"🔇", h:"Satz 7",
   body:["„<b>Wovon man nicht sprechen kann, darüber muss man schweigen.</b>“",
         "Das Buch endet mit seiner eigenen Selbstbegrenzung: Es zieht eine Linie um das Sagbare — und erkennt an, dass das Wichtigste außerhalb liegt. Wittgenstein nannte seine Sätze später eine <b>Leiter</b>, die man wegwirft, nachdem man hinaufgestiegen ist."]},
  {t:"mc", kicker:"Mini-Check", q:"Was sagt der berühmte Satz 7?",
   opts:["Alles lässt sich präzise ausdrücken","Wovon man nicht sprechen kann, darüber muss man schweigen","Sprache ist Macht","Logik ist die einzige Wahrheit"],
   correct:1, fb:"Die Sprache erreicht ihre Grenze — und muss sie markieren, statt sie zu überschreiten."},
  {t:"flip", kicker:"Verbindung zum Buch", front:"Wie nutzt du Wittgenstein — und wie ausdrücklich <i>nicht</i>?",
   reveal:"Wichtig: Du übernimmst ihn <b>nicht als Sprachtheorie</b>, sondern als <b>Schrankenbeweis</b>.<br><br>Für dein Axiom 2 (das Innere eines anderen ist durch Schlussfolgerung prinzipiell unerreichbar): Wittgenstein zeigt, dass selbst der formal strengste Versuch, das Sagbare auszuschöpfen, an der eigenen Grenze landet und sie markieren muss. „Tractatus erreicht seine eigene Grenze“ — nicht „Tractatus hat recht über Sprache“. Das stützt zugleich deine stilistische Selbstbeschränkung."},
 ]},

  {t:"info", kicker:"Die Gegenposition", emoji:"🗣️", h:"Urteilen als das politischste Vermögen",

 ]},

 ]},

/* ===================== STATE ===================== */
const KEY="kua_lernapp_v2";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}}
let S=load();
S.xp=S.xp||0; S.lessons=S.lessons||{}; S.streak=S.streak||0; S.lastDay=S.lastDay||null;
S.track=S.track||"kua";
S.review=S.review||{};
/* migrate v1 progress if present */
(function migrate(){
  try{
    const old=JSON.parse(localStorage.getItem("kua_lernapp_v1"));
    if(old && !S._migrated){
      S.xp=Math.max(S.xp, old.xp||0);
      S.streak=Math.max(S.streak, old.streak||0);
      S.lastDay=S.lastDay||old.lastDay;
      Object.assign(S.lessons, old.lessons||{});
      S._migrated=true; save(S);
    }
  }catch(e){}
})();
function today(){return new Date().toISOString().slice(0,10)}
function bumpStreak(){
  const t=today(); if(S.lastDay===t) return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?(S.streak+1):1; S.lastDay=t; save(S);
}
(function initStreak(){
  if(S.lastDay){
    const t=today(), y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    if(S.lastDay!==t && S.lastDay!==y){S.streak=0;}
  }
})();

      (c.tag?'<span class="tagline">'+c.tag+'</span>':"")+'</div>';

  } else if(c.t==="mc"){
    html='<div class="card"><div class="kicker">'+(c.kicker||"Quiz")+'</div><h3>'+c.q+'</h3>'+
      '<div class="opts" id="opts">'+c.opts.map((o,i)=>
        '<button class="opt" data-i="'+i+'" onclick="pick('+i+')"><span class="k">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></button>').join("")+
      '</div><div class="fb" id="fb"></div></div>';
    slot.innerHTML=html; act.textContent="Weiter"; act.disabled=true; act.className="btn";
  } else if(c.t==="flip"){
    html='<div class="card flip" id="flip"><div class="kicker">'+(c.kicker||"")+'</div>'+
      '<p class="front">'+c.front+'</p><div class="reveal">'+c.reveal+'</div></div>';
    slot.innerHTML=html; act.textContent="Antwort zeigen"; act.disabled=false; act.className="btn ghost";
  } else if(c.t==="recall"){
    html='<div class="card recall" id="recall"><div class="kicker">'+(c.kicker||"")+'</div>'+
      '<p class="prompt">'+c.prompt+'</p>'+(c.hint?'<p class="hint">💡 '+c.hint+'</p>':"")+
      '<div class="model">'+c.model+'</div></div>';
    slot.innerHTML=html; act.textContent="Musterlösung zeigen"; act.disabled=false; act.className="btn ghost";

function pick(i){
  if(answered) return; answered=true; answeredCount++;
  const c=cur.cards[idx];
  document.querySelectorAll("#opts .opt").forEach(o=>{
    o.disabled=true; const oi=+o.dataset.i;
    if(oi===c.correct) o.classList.add("correct");
    else if(oi===i) o.classList.add("wrong"); else o.classList.add("dim");
  });
  const fb=document.getElementById("fb");
  const lid=reviewMode?c._lid:cur.id, ci=reviewMode?c._ci:idx;
  if(i===c.correct){ correctCount++; fb.className="fb ok show"; fb.innerHTML="<b>Richtig ✓</b>"+c.fb; scheduleReview(lid,ci,true); }
  else { fb.className="fb no show"; fb.innerHTML="<b>Nicht ganz</b>"+c.fb; scheduleReview(lid,ci,false); }
  document.getElementById("actBtn").disabled=false;
}
function onAct(){
  const c=cur.cards[idx];
  if(c.t==="flip"){ const el=document.getElementById("flip");
    if(el && !el.classList.contains("open")){ el.classList.add("open");
      document.getElementById("actBtn").textContent="Weiter"; document.getElementById("actBtn").className="btn"; return; } }
  if(c.t==="recall"){ const el=document.getElementById("recall");
    if(el && !el.classList.contains("open")){ el.classList.add("open");
      const act=document.getElementById("actBtn"); act.style.display="none";
      const gb=document.createElement("div"); gb.className="graderow";
      gb.innerHTML='<button class="gradebtn no" onclick="gradeRecall(false)">👎 Nochmal</button>'+
                   '<button class="gradebtn ok" onclick="gradeRecall(true)">👍 Wusste ich</button>';
      document.getElementById("cardSlot").appendChild(gb);
      return; } }
  nextCard();
}
function nextCard(){
  idx++;
  if(idx>=cur.cards.length){ finishLesson(); return; }
  renderCard();
  if(!reviewMode){
    const pr=S.lessons[cur.id]||{};
    if(!pr.done){ pr.progress=Math.round((idx/cur.cards.length)*100); S.lessons[cur.id]=pr; save(S); }
  }
}
function gradeRecall(ok){
  const c=cur.cards[idx];
  const lid=reviewMode?c._lid:cur.id, ci=reviewMode?c._ci:idx;
  if(reviewMode){ answeredCount++; if(ok) correctCount++; }
  scheduleReview(lid,ci,ok);
  document.getElementById("actBtn").style.display="";
  nextCard();
}
function finishLesson(){
  document.getElementById("pbarFill").style.width="100%";
  if(reviewMode){ finishReview(); return; }
  const wasDone=(S.lessons[cur.id]||{}).done;
  const gained = wasDone? 0 : 20 + correctCount*5;
  S.xp += gained;
  S.lessons[cur.id]={done:true, progress:100, correct:correctCount, total:answeredCount};
  bumpStreak(); save(S);
  document.getElementById("cardSlot").innerHTML='<div class="done-scr">'+
     '<div class="big">🎉</div><h2>Lektion geschafft!</h2><p>'+cur.title+'</p>'+
     '<div class="scorebox">'+
       '<div><div class="v">'+(answeredCount?correctCount+"/"+answeredCount:"–")+'</div><div class="l">Quiz richtig</div></div>'+
       '<div><div class="v">+'+gained+'</div><div class="l">XP'+(wasDone?" (Wdh.)":"")+'</div></div>'+
       '<div><div class="v">🔥 '+S.streak+'</div><div class="l">Streak</div></div></div>'+
     '<p class="foothint">Tipp: Lies die Quelle jetzt mit dem Gerüst im Kopf — du exzerpierst schneller.</p></div>';
  const act=document.getElementById("actBtn");
  act.textContent="Zurück zur Übersicht"; act.className="btn"; act.disabled=false;
  act.onclick=function(){ act.onclick=onAct; renderHome(); };
}

/* ===================== WIEDERHOLUNG (SPACED REPETITION) ===================== */
/* Falsch beantwortete Quiz-/Recall-Karten wandern in eine Warteschlange.
   Bei jedem korrekten Durchgang wächst das Intervall (1→3→7→21→60 Tage),
   bei Fehler springt es zurück auf 0 (heute fällig). So wandert Gelerntes
   schrittweise vom Kurzzeit- ins Langzeitgedächtnis. */
const SR_STEPS=[1,3,7,21,60];
function addDays(iso,d){ const dt=new Date(iso+"T00:00:00"); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
function cardKey(lid,ci){ return lid+"#"+ci; }
function scheduleReview(lid,ci,ok){
  if(!lid && lid!==0) return;
  const k=cardKey(lid,ci); let r=S.review[k];
  const t=today();
  if(!ok){
    r=r||{lid:lid, ci:ci, step:0, lapses:0};
    r.step=0; r.lapses=(r.lapses||0)+1; r.due=t;     /* sofort wieder fällig */
    S.review[k]=r;
  } else {
    if(!r) return;                                   /* nur Gemerktes verfolgen, das mind. 1× falsch war */
    r.step=(r.step||0)+1;
    if(r.step>=SR_STEPS.length){ delete S.review[k]; save(S); return; }  /* gemeistert → raus */
    r.due=addDays(t, SR_STEPS[r.step]);
    S.review[k]=r;
  }
  save(S);
}
function dueReviews(){
  const t=today();
  return Object.keys(S.review).map(k=>S.review[k]).filter(r=>r && r.due && r.due<=t);
}
function buildReviewDeck(){
  const out=[];
  dueReviews().forEach(r=>{
    const les=LESSONS.find(l=>l.id===r.lid); if(!les) return;
    const c=les.cards[r.ci]; if(!c || (c.t!=="mc" && c.t!=="recall")) return;
    const copy=Object.assign({},c); copy._lid=r.lid; copy._ci=r.ci; copy._src=les.title;
    out.push(copy);
  });
  for(let i=out.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=out[i]; out[i]=out[j]; out[j]=tmp; }
  return out;
}
function startReview(){
  const deck=buildReviewDeck();
  if(!deck.length){ renderHome(); return; }
  cur={ id:"__review__", title:"Wiederholung", track:S.track, cards:deck };
  reviewMode=true; idx=0; correctCount=0; answeredCount=0;
  document.getElementById("homeView").style.display="none";
  const lv=document.getElementById("lessonView"); lv.style.display="block"; lv.classList.remove("allgrun"); lv.classList.remove("tiefrun");
  document.getElementById("streakNum2").textContent=S.streak;
  const act=document.getElementById("actBtn"); act.style.display=""; act.onclick=onAct;
  window.scrollTo(0,0); renderCard();
}
function finishReview(){
  const n=cur.cards.length;
  const gained=correctCount*3;
  S.xp+=gained; bumpStreak(); save(S);
  const stillDue=dueReviews().length;
  document.getElementById("cardSlot").innerHTML='<div class="done-scr">'+
     '<div class="big">🧠</div><h2>Wiederholung geschafft!</h2><p>'+n+' Karte'+(n>1?"n":"")+' wiederholt</p>'+
     '<div class="scorebox">'+
       '<div><div class="v">'+correctCount+'/'+(answeredCount||n)+'</div><div class="l">gewusst</div></div>'+
       '<div><div class="v">+'+gained+'</div><div class="l">XP</div></div>'+
       '<div><div class="v">🔥 '+S.streak+'</div><div class="l">Streak</div></div></div>'+
     '<p class="foothint">'+(stillDue>0?('Noch '+stillDue+' fällig — dranbleiben lohnt sich.'):'Alles wiederholt. Was du nicht wusstest, kommt in 1–3 Tagen erneut — so verankert es sich.')+'</p></div>';
  reviewMode=false;
  const act=document.getElementById("actBtn");
  act.style.display=""; act.textContent="Zurück zur Übersicht"; act.className="btn"; act.disabled=false;
  act.onclick=function(){ act.onclick=onAct; renderHome(); };
}

   '.reviewbanner .rb-body{flex:1;}'+
   '.reviewbanner .rb-t{font-weight:800;font-size:17px;}'+
   '.reviewbanner .rb-s{font-size:13px;opacity:.9;margin-top:2px;}'+
   '.reviewbanner .chev{font-size:26px;opacity:.85;}'+
   '.graderow{display:flex;gap:12px;margin:18px 4px 4px;}'+
   '.gradebtn{flex:1;border:none;border-radius:14px;padding:15px 10px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;}'+
   '.gradebtn.ok{background:#16a34a;}'+
   '.gradebtn.no{background:#e11d48;}'+
   '.gradebtn:active{transform:translateY(1px);}';
  const s=document.createElement("style"); s.textContent=css; document.head.appendChild(s);
})();

/* ===================== THEME (HELL / DUNKEL) ===================== */
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  const m=document.querySelector('meta[name="theme-color"]');
  if(m) m.setAttribute("content", t==="dark"?"#121310":"#3b6e58");
  const b=document.getElementById("themeBtn");
  if(b) b.textContent = (t==="dark"?"☀️":"🌙");
}
function toggleTheme(){
  const cur=(document.documentElement.getAttribute("data-theme")==="dark")?"dark":"light";
  const next=(cur==="dark")?"light":"dark";
  S.theme=next; save(S); applyTheme(next);
}
(function initTheme(){
  let t=S.theme;
  if(t!=="light" && t!=="dark"){
    t=(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  }
  applyTheme(t);
})();

renderHome();
</script>
